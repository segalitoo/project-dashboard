<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="לוח מצב פרוייקטים — סקירה מעודכנת של כל הפרוייקטים המקומיים">
  <meta name="theme-color" content="#faf9f7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>לוח פרוייקטים</title>
  <link rel="stylesheet" href="index.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
</head>
<body>
  <div class="page">

    <header class="dashboard-header">
      <div class="header-row">
        <h1 class="header-title">הפרוייקטים שלי</h1>
        <span class="header-updated" id="last-updated">
          <span class="live-dot"></span>
          טוען...
        </span>
      </div>
      <hr class="header-line">
    </header>

    <nav class="stats-row" id="stats-bar" aria-label="סינון לפי סטטוס">
      <button class="stat-pill" data-filter="all" aria-pressed="true" id="stat-total">
        הכל <span class="count" id="count-total">-</span>
      </button>
      <button class="stat-pill" data-filter="active" aria-pressed="false" id="stat-active">
        פעילים <span class="count" id="count-active">-</span>
      </button>
      <button class="stat-pill" data-filter="idle" aria-pressed="false" id="stat-idle">
        ממתינים <span class="count" id="count-idle">-</span>
      </button>
      <button class="stat-pill" data-filter="stale" aria-pressed="false" id="stat-stale">
        לא פעילים <span class="count" id="count-stale">-</span>
      </button>
    </nav>

    <div class="search-wrap">
      <input
        type="text"
        class="search-input"
        id="search-input"
        placeholder="חיפוש פרוייקט..."
        autocomplete="off"
      >
    </div>

    <main class="project-list" id="project-list">
      <!-- Rendered by JS -->
    </main>

  </div>

  <script src="app.js"></script>
</body>
</html>
