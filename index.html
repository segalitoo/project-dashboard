<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="מחברת — יומן עבודה אישי של פרוייקטים">
  <meta name="theme-color" content="#f3eee4">
  <title>מחברת</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;500;700&family=Heebo:wght@300;400;500&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="index.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📓</text></svg>">
</head>
<body>

  <header class="masthead">
    <div class="masthead-inner">
      <div class="masthead-title-block">
        <h1 class="masthead-title">מחברת</h1>
        <p class="masthead-sub">a working journal of projects</p>
      </div>
      <div class="masthead-meta" id="masthead-meta" dir="ltr"></div>
    </div>
    <div class="masthead-rule" aria-hidden="true"></div>
  </header>

  <main class="layout">
    <section class="col col-projects" aria-label="פרוייקטים">
      <div class="col-label" dir="ltr">— projects</div>
      <div class="projects-list" id="projects-list"></div>
    </section>

    <section class="col col-notes" aria-label="תזכורות">
      <div class="col-label" dir="ltr">— notes</div>
      <div class="notes-feed" id="notes-feed"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
